<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="icon" type="image/png" href="/image.png" />
    <link rel="apple-touch-icon" href="/image.png" />

    <!-- Primær søkemotoroptimalisering (SEO) -->
    <title>REmember – Lightweight Browser Note-Taking for Developers</title>
    <meta name="description" content="Quickly save code snippets and short notes, search effortlessly, and keep everything stored locally in your browser. The ultimate lightweight tool for developers." />
    <meta name="keywords" content="note-taking app, code snippets, local storage app, developer tools, browser notepad, lightweight text editor" />

    <!-- Open Graph / Facebook / LinkedIn (Sosiale medier) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://remember.ves3.no/" />
    <meta property="og:title" content="REmember – Browser Note-Taking for Developers" />
    <meta property="og:description" content="Quickly save code snippets, search effortlessly, and keep everything stored locally in your browser." />
    <meta property="og:image" content="https://ves3.no" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" /> <!-- Endret til standard 'summary' siden ikonet er kvadratisk -->
    <meta name="twitter:url" content="https://remember.ves3.no/" />
    <meta name="twitter:title" content="REmember – Browser Note-Taking for Developers" />
    <meta name="twitter:description" content="Quickly save code snippets, search effortlessly, and keep everything stored locally in your browser." />
    <meta name="twitter:image" content="https://ves3.no" />

    <meta name="theme-color" content="#0B0F14">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />


    <!-- Link to Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS Specific Support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="REmember" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
</html>
